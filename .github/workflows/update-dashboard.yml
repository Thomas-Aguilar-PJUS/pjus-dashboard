name: Update PJUS Dashboard

on:
  schedule:
    # Runs Mon-Fri at 14:30 BRT (17:30 UTC) - after all 3 daily pipeline jobs finish
    - cron: '30 17 * * 1-5'
  workflow_dispatch:  # Allows manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Update DataJud historical data (last 2 months)
        run: python scripts/extrair_datajud.py --months 2
        env:
          DATAJUD_API_KEY: ${{ secrets.DATAJUD_API_KEY }}

      - name: Extract data from Argus DB
        run: python scripts/extrair_dados.py
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Merge DataJud + Argus into dashboard JSON
        run: python scripts/extrair_datajud.py --aggregate --merge data/dados_argus.json --output data/dados_argus.json
        env:
          DATAJUD_API_KEY: ${{ secrets.DATAJUD_API_KEY }}

      - name: Build dashboard HTML
        run: python scripts/build_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/dados_historico.db data/dados_argus.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
